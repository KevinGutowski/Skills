name: Validate skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - run: python3 scripts/validate_all.py
      - run: python3 scripts/check_vercel_overhaul.py
      - run: python3 scripts/check_vercel_routing_probes.py
      - run: python3 scripts/check_skill_smoke_tests.py
